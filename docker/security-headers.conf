# Low-risk static-app security headers (Cloud Run readiness slice).
#
# Deliberately excluded:
#  - Content-Security-Policy: the repo has none today; adding one here risks
#    silently breaking Supabase/auth requests and needs its own review.
#  - Strict-Transport-Security: Cloud Run terminates TLS upstream of this
#    container; HSTS is an edge/domain-level decision, not this container's.
#
# `always` ensures these are also sent on non-2xx responses (e.g. the 404s
# returned for missing static assets).
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
